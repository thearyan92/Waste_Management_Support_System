
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend-wms-app
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend-wms-app
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped
  
  redis:
    image: redis:alpine
    container_name: redis-wms-app
    ports:
      - "6379:6379"
    restart: unless-stopped
